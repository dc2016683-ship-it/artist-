<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VESKARD ARTIST | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@900&display=swap');

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: #e1f5fe;
            display: flex; align-items: center; justify-content: center;
        }

        .stars-container { position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .star { position: absolute; color: #42a5f5; text-shadow: 0 0 10px #fff; animation: twinkle 2s infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }

        .container { position: relative; z-index: 10; text-align: center; display: flex; flex-direction: column; align-items: center; }

        .music-header { display: flex; gap: 20px; margin-bottom: 5px; filter: drop-shadow(0 0 15px rgba(13, 71, 161, 0.7)); }
        .icon-glitter {
            font-size: 5rem;
            background: linear-gradient(45deg, #0d47a1, #64b5f6, #0d47a1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: float 3s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        h1 {
            font-size: 3.5rem; margin: 0; text-transform: uppercase;
            background: linear-gradient(90deg, #0d47a1, #64b5f6, #0d47a1);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite; filter: drop-shadow(0 5px 15px rgba(13, 71, 161, 0.4));
        }
        @keyframes shine { to { background-position: 200% center; } }

        .nav-box { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; width: 360px; }
        .screen { display: none; width: 100%; flex-direction: column; gap: 15px; animation: fadeIn 0.4s ease; }
        .active { display: flex; }

        .btn {
            text-decoration: none; padding: 16px; border-radius: 50px; font-size: 1.1rem; font-weight: bold;
            text-transform: uppercase; border: 2px solid white; transition: 0.3s; cursor: pointer;
            backdrop-filter: blur(8px); text-align: center; color: white;
        }
        .btn-main { background: rgba(179, 157, 219, 0.8); }
        .btn-blue { background: rgba(144, 202, 249, 0.8); }
        .btn:hover { transform: scale(1.05); background: white; color: #0d47a1; }

        .album-content { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .album-img {
            width: 280px; height: 280px; border-radius: 15px; 
            border: 5px solid white; box-shadow: 0 15px 35px rgba(13, 71, 161, 0.4);
            object-fit: cover;
        }
        .album-title { font-size: 1.8rem; color: #0d47a1; font-weight: 900; margin-top: 5px; }
        .album-desc { font-size: 0.8rem; color: #1976d2; font-weight: bold; text-transform: uppercase; }
        .album-warning { font-size: 0.75rem; color: #0d47a1; font-style: italic; opacity: 0.8; }

        .back-btn { background: none; border: none; color: #0d47a1; font-weight: bold; cursor: pointer; align-self: flex-start; font-size: 1rem; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
