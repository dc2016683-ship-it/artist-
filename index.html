<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veskard INFO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            background-color: #000;
            /* Imagen de fondo: Galaxia, Océano y Luna */
            background-image: url('https://w0.peakpx.com/wallpaper/515/341/HD-wallpaper-moon-over-the-ocean-moonlight-clouds-stars-sea-sky-night.jpg');
            background-size: cover;
            background-position: center;
        }

        /* Capa de brillo azul galáctico */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, rgba(0, 0, 0, 0.5) 100%);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        h1 {
            color: #fff;
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 50px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.9), 0 0 30px rgba(0, 212, 255, 0.4);
        }

        /* Botones LIQUID GLASS */
        .glass-btn {
            display: block;
            margin: 20px auto;
            padding: 20px;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 3px;
            font-size: 1.1rem;
            
            /* Efecto de Cristal Líquido */
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-btn:hover {
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid rgba(0, 212, 255, 0.7);
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.5);
            letter-spacing: 5px;
        }

        /* Animación de brillo interno */
        .glass-btn::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(45deg);
            transition: 0.8s;
            pointer-events: none;
        }

        .glass-btn:hover::after {
            left: 100%;
        }

        /* Líneas de escaneo sutiles para el look hacker */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 3;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    
    <div class="container">
        <h1>Veskard INFO</h1>
        
        <a href="https://dc2016683-ship-it.github.io/artist-/" class="glass-btn" target="_blank">Música de Veskard</a>
        <a href="https://beacons.ai/veskard" class="glass-btn" target="_blank">Redes Sociales</a>
    </div>
</body>
</html>
